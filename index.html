<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <body class="min-h-screen bg-gray-100 text-gray-900 flex flex-col items-center justify-center">
    <header class="flex flex-col gap-4 text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-primary tracking-tight">
        Todo App
      </h1>

      <p class="text-secondary text-sm md:text-base">
        Manage your daily tasks efficiently
      </p>
    </header>
    <main class="mt-2 space-x-3">
      <form id="todo-form" class="flex flex-col md:flex-row items-center gap-3">
        <input
          id="task-input"
          type="text"
          placeholder="Enter a task..."
          class="flex-1 px-4 py-3 rounded-xl border border-gray-200 bg-white text-gray-900 placeholder:text-gray-600 outline-none focus:border-gray-700 transition"
        />

        <button
          type="submit"
          class="w-full px-5 py-3 rounded-xl bg-blue-600 hover:bg-accent-hover text-white font-medium transition cursor-pointer">
          Add
        </button>
      </form>
    </main>
    <script type="module" src="./js/main.js"></script>
  </body>

</html>
