<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <body class="min-h-screen bg-gray-100 text-gray-900 flex flex-col items-center justify-center">
    <header class="flex flex-col gap-4 text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-primary tracking-tight">
        Todo App
      </h1>

      <p class="text-secondary text-sm md:text-base">
        Manage your daily tasks efficiently
      </p>
    </header>
    <main class="mt-2">
      <!-- Input Field for task input -->
      <form id="todo-form" class="flex flex-col md:flex-row items-center gap-3 px-2">
        <input
          id="todo-input"
          type="text"
          placeholder="Enter a task..."
          class="w-full md:flex px-4 py-3 rounded-xl border border-gray-200 bg-white text-gray-900 placeholder:text-gray-600 outline-none focus:border-gray-700 transition"
        />

        <button
          type="submit"
          id="submit-btn"
          class="w-full md:flex-1 px-5 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium transition cursor-pointer">
          Add
        </button>
      </form>
      <!-- Todo Container -->
       <section class="mt-6 bg-white rounded-2xl p-2 min-h-120 min-w-sm">
        <!-- todo list -->
         <ul id="todo-list" class="space-y-3">
          <!-- Todo Items will be rendered here -->
         </ul>
         <!-- Empty Todo -->
         <div id="empty-state" class="mt-8 text-center flex flex-col justify-center items-center">
            <p class="text-secondary text-md font-bold">
              No tasks yet.
            </p>
            <p class="text-secondary text-sm mt-1">
              Add your first task to get started.
            </p>
          </div>
        </section>
    </main>
    <script type="module" src="./js/main.js"></script>
  </body>

</html>
